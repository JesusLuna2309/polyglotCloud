spring:
  application:
    name: polyglotCloud
  
  # Base de datos Cloud SQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:polyglotcloud_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  # JPA optimizado para producción
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Redis Memorystore
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2

  # Email (SendGrid recomendado)
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Configuración JWT para producción
app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000  # 24 horas
    refresh-expiration: 604800000  # 7 días
    issuer: ${DOMAIN_NAME:polyglotcloud.com}
    cookie:
      name: refresh_token
      expiration-s: 604800
      secure: true  # HTTPS en producción
      same-site: Strict

  # Rate limiting para producción
  rate-limit:
    global:
      requests-per-minute: 100
    translation:
      requests-per-minute: 10
      requests-per-hour: 50
    auth:
      requests-per-minute: 5
      requests-per-hour: 20
    anonymous:
      requests-per-minute: 10

  # Email configuración
  email:
    from: ${EMAIL_FROM:noreply@polyglotcloud.com}
    verification-url: https://${DOMAIN_NAME}/auth/verify-email
    support-email: ${EMAIL_SUPPORT:support@polyglotcloud.com}

# Logging para producción
logging:
  level:
    com.jesusLuna.polyglotCloud: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator para health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized