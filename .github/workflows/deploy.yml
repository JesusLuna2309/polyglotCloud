name: CI/CD - Deploy to Cloud Run

on:
  push:
    branches:
      - Desarrollo
    tags:
      - 'v*'

env:
  PROJECT_ID: polyglot-cloud-app
  REGION: us-central1
  SERVICE_NAME: polyglot-cloud
  IMAGE: gcr.io/polyglot-cloud-app/polyglot-cloud

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --set-env-vars \
            CLOUD_SQL_CONNECTION_NAME="${{ secrets.CLOUD_SQL_CONNECTION_NAME }}", \
            DB_NAME="${{ secrets.DB_NAME }}", \
            DB_USERNAME="${{ secrets.DB_USERNAME }}", \
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}", \
            REDIS_HOST="${{ secrets.REDIS_HOST }}", \
            REDIS_PORT="${{ secrets.REDIS_PORT }}", \
            JWT_SECRET="${{ secrets.JWT_SECRET }}", \
            MAIL_HOST="${{ secrets.MAIL_HOST }}", \
            MAIL_PORT="${{ secrets.MAIL_PORT }}", \
            MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}", \
            MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}", \
            EMAIL_FROM="${{ secrets.EMAIL_FROM }}", \
            EMAIL_SUPPORT="${{ secrets.EMAIL_SUPPORT }}" \
            --quiet