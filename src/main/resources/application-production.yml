spring:
  application:
    name: polyglotCloud
  
  # ✅ BASE DE DATOS - Google Cloud SQL con Connector
  datasource:
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000
      auto-commit: true

  # ✅ JPA optimizado para producción
  jpa:
    hibernate:
      ddl-auto: none  # ⚠️ IMPORTANTE: usa Flyway para migraciones
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false

  # ✅ FLYWAY MIGRATIONS
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
    out-of-order: false

  # ✅ REDIS - Google Cloud Memorystore
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000ms
      connect-timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 2
          max-wait: -1ms

  # ✅ EMAIL - Gmail para producción
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          ssl:
            trust: smtp.gmail.com

# ✅ CONFIGURACIÓN JWT PARA PRODUCCIÓN
app:
  jwt:
    secret: ${JWT_SECRET}  # DEBE TENER 32+ caracteres
    expiration-ms: 86400000  # 24 horas
    refresh-expiration: 604800000  # 7 días
    issuer: ${DOMAIN_NAME:polyglotcloud.com}
    cookie:
      name: refresh_token
      expiration-s: 604800
      secure: true  # HTTPS en producción
      same-site: Strict
      http-only: true

  # ✅ RATE LIMITING - Valores ajustados para producción
  rate-limit:
    global:
      requests-per-minute: 100
    translation:
      requests-per-minute: 10
      requests-per-hour: 50
    auth:
      requests-per-minute: 5
      requests-per-hour: 20
    anonymous:
      requests-per-minute: 10

  # ✅ DETECCIÓN DE ABUSO
  abuse-detection:
    enabled: true
    threshold: 5
    window-hours: 1
    block-duration-hours: 2

  # ✅ EMAIL CONFIGURACIÓN
  email:
    from: ${EMAIL_FROM:noreply@polyglotcloud.com}
    verification-url: https://${DOMAIN_NAME}/auth/verify-email
    support-email: ${EMAIL_SUPPORT:support@polyglotcloud.com}

  # ✅ SEGURIDAD
  security:
    max-failed-attempts-temp: 5
    max-failed-attempts-perm: 10
    lockout-duration-minutes: 30
    lockout-duration-days: 1

# ✅ LOGGING - Minimal para producción
logging:
  level:
    com.jesusLuna.polyglotCloud: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.flywaydb: INFO
    root: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# ✅ HEALTH CHECK PARA CLOUD RUN
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# ✅ SERVER
server:
  port: 8080  # Cloud Run espera puerto 8080
  compression:
    enabled: true
    min-response-size: 1024
  tomcat:
    threads:
      max: 200
      min-spare: 10